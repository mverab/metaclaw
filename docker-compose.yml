services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    depends_on:
      - searxng
    environment:
      OPENCLAW_GATEWAY_BIND: lan
      # LLM — all optional, pick at least one
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Local Ollama — no key needed, just point at your Ollama host
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBED_URL: ${OLLAMA_EMBED_URL:-http://host.docker.internal:11434}
      # Search — SearXNG runs as a sibling container, no API key needed
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      # Channels
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist OpenClaw state across container restarts
      - openclaw-home:/home/node/.openclaw
      # Mount our skill into the shared skills directory
      - ./skills/metaclaw-setup-architect:/home/node/.openclaw/skills/metaclaw-setup-architect:ro
      # Mount test workspace (for running tests)
      - ./test/workspace:/home/node/.openclaw/workspace
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Self-hosted SearXNG — zero-key web search (internal only, no exposed ports)
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      SEARXNG_SECRET_KEY: ${SEARXNG_SECRET_KEY:-changeme-in-production}

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    network_mode: "service:openclaw-gateway"
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    volumes:
      - openclaw-home:/home/node/.openclaw
      - ./skills/metaclaw-setup-architect:/home/node/.openclaw/skills/metaclaw-setup-architect:ro
      - ./test/workspace:/home/node/.openclaw/workspace
    environment:
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    entrypoint: ["node", "dist/index.js"]
    profiles:
      - cli

volumes:
  openclaw-home:
