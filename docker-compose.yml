x-llm-env: &llm-env
  ZAI_API_KEY: ${ZAI_API_KEY:-}
  ZAI_BASE_URL: ${ZAI_BASE_URL:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    depends_on:
      searxng:
        condition: service_healthy
    environment:
      <<: *llm-env
      # lan = bind to all interfaces inside the container; the host-side port
      # is still locked to 127.0.0.1 via the ports mapping above.
      OPENCLAW_GATEWAY_BIND: lan
      OLLAMA_EMBED_URL: ${OLLAMA_EMBED_URL:-http://host.docker.internal:11434}
      # Search — SearXNG runs as a sibling container, no API key needed
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      # Channels
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist OpenClaw state across container restarts
      - openclaw-home:/home/node/.openclaw
      # Mount our skill into the shared skills directory
      - ./skills/metaclaw-setup-architect:/home/node/.openclaw/skills/metaclaw-setup-architect:ro
      # Mount test workspace (for running tests)
      - ./test/workspace:/home/node/.openclaw/workspace
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Self-hosted SearXNG — zero-key web search (internal only, no exposed ports)
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    environment:
      # Must be set in .env before first run — no insecure default provided
      SEARXNG_SECRET_KEY: ${SEARXNG_SECRET_KEY:?Set SEARXNG_SECRET_KEY in .env}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    network_mode: "service:openclaw-gateway"
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    volumes:
      - openclaw-home:/home/node/.openclaw
      - ./skills/metaclaw-setup-architect:/home/node/.openclaw/skills/metaclaw-setup-architect:ro
      - ./test/workspace:/home/node/.openclaw/workspace
    environment:
      <<: *llm-env
    entrypoint: ["node", "dist/index.js"]
    profiles:
      - cli

volumes:
  openclaw-home:
